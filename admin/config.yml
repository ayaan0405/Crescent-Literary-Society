backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - label: "Homepage Carousel"
        name: "carousel"
        file: "data/carousel.json"
        fields:
          - label: "Slides"
            name: "slides"
            widget: "list"
            fields:
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Alt Text", name: "altText", widget: "string", required: false}

      - label: "Blog Index"
        name: "blog"
        file: "data/blog.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Publish Date", name: "date", widget: "datetime"}
              - {label: "Author", name: "author", widget: "string"}
              - {label: "Thumbnail Image", name: "thumbnail", widget: "image", required: false}
              - {label: "Body", name: "body", widget: "markdown"}
